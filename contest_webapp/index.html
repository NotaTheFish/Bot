<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Голосование конкурса</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1>Голосование конкурса</h1>
        <p id="votesCounter" class="votes-counter">Осталось голосов: —</p>
        <button id="rulesLink" class="rules-link" type="button">Правила конкурса</button>
      </header>

      <section id="entriesGrid" class="entries-grid" aria-live="polite"></section>
      <p id="statusMessage" class="status-message"></p>
    </main>

    <section id="rulesModal" hidden>
      <article class="entry-card">
        <div class="entry-card__body">
          <h2 class="entry-card__title">Правила конкурса</h2>
          <p id="rulesContent" class="status-message"></p>
          <button id="rulesClose" class="vote-button" type="button">Закрыть</button>
        </div>
      </article>
    </section>

    <template id="entryCardTemplate">
      <article class="entry-card">
        <img class="entry-card__image" alt="Работа участника" loading="lazy" />
        <div class="entry-card__body">
          <h2 class="entry-card__title"></h2>
          <p class="entry-card__votes"></p>
          <button class="vote-button" type="button">Проголосовать</button>
        </div>
      </article>
    </template>

    <script src="/static/app.js"></script>
  </body>
</html>
