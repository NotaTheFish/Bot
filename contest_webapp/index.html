<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Конкурс рисунков</title>
    <link rel="stylesheet" href="/static/styles.css?v=__APP_ASSET_VERSION__" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body class="theme-light">
    <script>
      (function () {
        var STORAGE_KEY = "contest_webapp_theme";
        var root = document.body;
        if (!root) return;

        try {
          var savedTheme = window.localStorage && window.localStorage.getItem(STORAGE_KEY);
          var nextTheme = savedTheme === "dark" ? "dark" : "light";
          root.classList.remove("theme-light", "theme-dark");
          root.classList.add("theme-" + nextTheme);
        } catch (_error) {
          root.classList.remove("theme-dark");
          root.classList.add("theme-light");
        }
      })();
    </script>
    <main class="app">
      <header class="app__header">
        <div class="app__header-top">
          <div class="theme-toggle-wrap">
            <button
              id="themeToggle"
              class="theme-toggle"
              type="button"
              aria-label="Включить тёмную тему"
              data-theme-intent="dark"
            >
              <svg
              class="theme-toggle__icon theme-toggle__icon--moon"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                d="M14.633 3.182a1 1 0 0 1 .498 1.245A8.5 8.5 0 1 0 19.573 8.87a1 1 0 0 1 1.245.498A10.5 10.5 0 1 1 14.633 3.182Z"
                fill="currentColor"
              />
              </svg>
              <svg
              class="theme-toggle__icon theme-toggle__icon--sun"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                d="M12 6.25a5.75 5.75 0 1 1 0 11.5a5.75 5.75 0 0 1 0-11.5Zm0-4.25a1 1 0 0 1 1 1v1.75a1 1 0 1 1-2 0V3a1 1 0 0 1 1-1Zm0 17.25a1 1 0 0 1 1 1V22a1 1 0 1 1-2 0v-1.75a1 1 0 0 1 1-1ZM4.398 3.984a1 1 0 0 1 1.414 0L7.05 5.22A1 1 0 1 1 5.636 6.636L4.398 5.398a1 1 0 0 1 0-1.414Zm12.552 12.552a1 1 0 0 1 1.414 0l1.238 1.238a1 1 0 0 1-1.414 1.414l-1.238-1.238a1 1 0 0 1 0-1.414ZM2 12a1 1 0 0 1 1-1h1.75a1 1 0 1 1 0 2H3a1 1 0 0 1-1-1Zm17.25 0a1 1 0 0 1 1-1H22a1 1 0 1 1 0 2h-1.75a1 1 0 0 1-1-1ZM5.636 17.364A1 1 0 0 1 7.05 18.78l-1.238 1.238a1 1 0 0 1-1.414-1.414l1.238-1.238Zm12.552-12.552a1 1 0 0 1 1.414 1.414L18.364 7.05a1 1 0 1 1-1.414-1.414l1.238-1.238Z"
                fill="currentColor"
              />
              </svg>
            </button>
          </div>
        </div>
        <div class="app__header-copy">
        </div>
        <h1>Конкурс рисунков</h1>
        <p id="contestStage" class="stage-badge">Статус: загрузка...</p>
        <p id="votesCounter" class="votes-counter">Выбрано: 0/3</p>
        <button class="rules-button" id="rulesButton" type="button">
          📜 Правила конкурса
        </button>
      </header>

      <section id="entriesGrid" class="entries-grid" aria-live="polite"></section>
      <p id="statusMessage" class="status-message"></p>

      <section id="adminPanel" class="admin-panel" hidden>
        <h2>Режим администратора</h2>
        <div id="adminStatusCard" class="admin-status-card"></div>
        <div class="admin-actions" aria-label="Управление этапами конкурса">
          <div class="admin-control-group" role="group" aria-labelledby="submissionControlLabel">
            <div class="admin-control-group__header">
              <div class="admin-control-group__copy">
                <p id="submissionControlLabel" class="admin-control-group__title">Приём заявок</p>
                <span class="admin-control-group__hint">Управление доступностью отправки работ</span>
              </div>
              <span id="submissionStatusText" class="admin-control-group__status">Закрыт</span>
            </div>
            <button
              id="submissionToggle"
              class="admin-switch"
              type="button"
              role="switch"
              aria-labelledby="submissionControlLabel submissionStatusText"
              aria-checked="false"
              aria-busy="false"
              data-state="unchecked"
            >
              <span class="admin-switch__track" aria-hidden="true">
                <span class="admin-switch__thumb"></span>
              </span>
            </button>
          </div>
          <div class="admin-control-group" role="group" aria-labelledby="votingControlLabel">
            <div class="admin-control-group__header">
              <div class="admin-control-group__copy">
                <p id="votingControlLabel" class="admin-control-group__title">Голосовние</p>
                <span class="admin-control-group__hint">Переключение режима голосования участников</span>
              </div>
              <span id="votingStatusText" class="admin-control-group__status">Закрыто</span>
            </div>
            <button
              id="votingToggle"
              class="admin-switch"
              type="button"
              role="switch"
              aria-labelledby="votingControlLabel votingStatusText"
              aria-checked="false"
              aria-busy="false"
              data-state="unchecked"
            >
              <span class="admin-switch__track" aria-hidden="true">
                <span class="admin-switch__thumb"></span>
              </span>
            </button>
          </div>
        </div>
        <div id="adminOverview" class="admin-overview"></div>
      </section>
    </main>

    <footer id="actionBar" class="action-bar" hidden>
      <p id="actionBarText"></p>
      <button id="actionBarButton" class="vote-button" type="button"></button>
      <button id="confirmVotesBtn" class="vote-button vote-button--confirm" type="button" hidden>Подтвердить голоса</button>
    </footer>

    <section id="rulesModal" class="modal" hidden>
      <article class="entry-card">
        <div class="entry-card__body">
          <h2 class="entry-card__title">Правила конкурса</h2>
          <div id="rulesContent" class="status-message"></div>
          <button id="rulesClose" class="vote-button" type="button">Закрыть</button>
        </div>
      </article>
    </section>

    <section id="confirmModal" class="modal" hidden>
      <article class="entry-card">
        <div class="entry-card__body">
          <h2 class="entry-card__title">Подтвердить голоса?</h2>
          <p class="status-message">После подтверждения изменить выбор нельзя.</p>
          <button id="confirmYes" class="vote-button vote-button--confirm" type="button">Подтвердить</button>
          <button id="confirmNo" class="vote-button vote-button--secondary" type="button">Отмена</button>
        </div>
      </article>
    </section>


    <section id="adminEntryDetailModal" class="modal" hidden>
      <article class="entry-card admin-detail-card" role="dialog" aria-modal="true" aria-label="Детали работы">
        <div class="entry-card__body">
          <div class="admin-detail-card__header">
            <h2 class="entry-card__title">Детали работы</h2>
            <button id="adminEntryDetailClose" class="admin-entry-button" type="button">Закрыть</button>
          </div>
          <div id="adminEntryDetailContent" class="admin-detail-content"></div>
        </div>
      </article>
    </section>

    <section id="imagePreviewModal" class="modal modal--preview" hidden>
      <article class="preview-card" role="dialog" aria-modal="true" aria-label="Просмотр рисунка">
        <button id="imagePreviewClose" class="preview-card__close" type="button" aria-label="Закрыть">✕</button>
        <p id="imagePreviewTitle" class="preview-card__title"></p>
        <img id="imagePreviewImage" class="preview-card__image" alt="Увеличенный рисунок" />
      </article>
    </section>

    <template id="entryCardTemplate">
      <article class="entry-card">
        <div class="entry-card__media">
          <img class="entry-card__image" alt="Работа участника" loading="lazy" />
          <button class="entry-card__preview-btn" type="button" aria-label="Увеличить изображение">🔍</button>
        </div>
        <div class="entry-card__body">
          <h2 class="entry-card__title"></h2>
          <p class="entry-card__meta"></p>
        </div>
      </article>
    </template>

    <script src="/static/app.js?v=__APP_ASSET_VERSION__"></script>
  </body>
</html>
